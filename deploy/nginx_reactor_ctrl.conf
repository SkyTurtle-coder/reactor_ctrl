server {
    listen 80;
    server_name v002020.edu.ds.fhnw.ch;

    # Increase upload/body size for recipe/config uploads
    client_max_body_size 10M;

    # Proxy all requests to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) support — disable buffering for live streams
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Static files served directly by nginx (faster)
    location /static/ {
        alias /home/pthuerlemann/reactor_ctrl/static/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
