server {
    listen 80;
    server_name v002020.edu.ds.fhnw.ch u1-process-control.lifesciences.fhnw.ch;

    return 301 https://u1-process-control.lifesciences.fhnw.ch$request_uri;
}

server {
    listen 443 ssl;
    server_name v002020.edu.ds.fhnw.ch;

    ssl_certificate /etc/letsencrypt/live/u1-process-control.lifesciences.fhnw.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/u1-process-control.lifesciences.fhnw.ch/privkey.pem;

    return 301 https://u1-process-control.lifesciences.fhnw.ch$request_uri;
}

server {
    listen 443 ssl;
    server_name u1-process-control.lifesciences.fhnw.ch;

    ssl_certificate /etc/letsencrypt/live/u1-process-control.lifesciences.fhnw.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/u1-process-control.lifesciences.fhnw.ch/privkey.pem;

    # Increase upload/body size for recipe/config uploads
    client_max_body_size 10M;

    # Proxy all requests to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) support — disable buffering for live streams
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Static files are proxied to Flask instead of using an alias into /home.
    # On hardened hosts nginx often cannot traverse user home directories,
    # which turns CSS/JS requests into 403 responses and leaves only raw HTML.
    location /static/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
